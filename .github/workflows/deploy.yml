name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hotel-price-api-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on:
      - self-hosted
      - linux
      - x64
      - hotel-api

    timeout-minutes: 15

    steps:
      - name: Runner diagnostics
        timeout-minutes: 1
        shell: bash
        run: |
          set -Eeuo pipefail
          echo "Expected labels: self-hosted, linux, x64, hotel-api"
          echo "Runner name: ${RUNNER_NAME:-unknown}"
          echo "Runner OS: ${RUNNER_OS:-unknown}"
          echo "Runner architecture: ${RUNNER_ARCH:-unknown}"
          echo "Workspace: ${GITHUB_WORKSPACE:-unknown}"
          pwd
          ls -la
          whoami
          uname -a
          test "${RUNNER_OS}" = "Linux"
          test "${RUNNER_ARCH}" = "X64"

      - name: Deploy production
        timeout-minutes: 10
        shell: bash
        run: |
          set -Eeuo pipefail
          cd /home/ubuntu/hotel-api
          pwd
          ls -la
          git remote -v
          git status --short --branch
          bash ./deploy.sh

      - name: Verify production
        timeout-minutes: 1
        shell: bash
        run: |
          set -Eeuo pipefail
          curl --fail --silent --show-error --max-time 5 \
            http://127.0.0.1:3000/health
          echo
          pm2 describe hotel-price-api

      - name: Failure diagnostics
        if: failure()
        shell: bash
        run: |
          echo "Deployment failed on ${RUNNER_NAME:-unknown} (${RUNNER_OS:-unknown}/${RUNNER_ARCH:-unknown})."
          echo "Required labels: self-hosted, linux, x64, hotel-api"
          pm2 status || true
          pm2 logs hotel-price-api --lines 80 --nostream || true
